name: BBX-Delivery-Check

on:
  schedule:
    # Every hour
    - cron: "0 * * * *"
  workflow_dispatch: {}  # allows manual "Run workflow" button too

permissions:
  contents: write  # needed to commit updated delivery_state.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-bbx.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run delivery date check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/track_delivery_date_playwright.py

      - name: Commit updated delivery_state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/delivery_state.json
          git diff --cached --quiet || git commit -m "BBX-Delivery-Check: update state [skip ci]"
          git push
