name: New-BBX-Products

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # allows manual "Run workflow" button too

permissions:
  contents: write  # needed to commit updated products.txt back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.61.0-noble  # match your pinned playwright version
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-bbx.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements-bbx.txt

      - name: Run catalog scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          HEADLESS: "true"
        run: python scripts/scrape_hasbro_catalog.py

      - name: Commit updated products.txt if changed
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/products.txt scripts/hasbro_catalog.txt
          git diff --cached --quiet || git commit -m "New-BBX-Products: update catalog [skip ci]"
          git push
